name: Build-Curl

on:
  workflow_dispatch:

jobs:
  build-and-curl:
    runs-on: ubuntu-latest

    steps:
      - name: Get code
        uses: actions/checkout@v4

      - name: docker_build
        run: |
          docker build -t pipeline-test ./ACMP2400

      - name: docker_run
        run: |
          docker run -d -p 8000:8000 --name test-container pipeline-test

      - name: wait_for_app
        run: |
          max_attempts=30
          attempt=1
          while [ $attempt -le $max_attempts ]; do
            if curl -f http://localhost:8000/ 2>/dev/null; then
              echo "Application is healthy"
              exit 0
            fi
            echo "Attempt $attempt/$max_attempts: Application not ready yet, retrying in 2 seconds..."
            sleep 2
            attempt=$((attempt + 1))
          done
          echo "Application failed to become ready after 60 seconds"
          docker logs test-container
          exit 1

      - name: Show container logs if needed
        if: failure()
        run: docker logs test-container
