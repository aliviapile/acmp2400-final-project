name: Build and Curl

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-curl:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t myapp ./ACMP2400

      - name: Run container
        run: docker run -d -p 8000:8000 --name myapp myapp

      - name: Show running containers
        run: docker ps -a

      - name: Show container logs
        run: docker logs myapp

      - name: Wait for app
        run: |
          for i in {1..30}; do
            if curl -f http://localhost:8000; then
              exit 0
            fi
            echo "Waiting for app to start... ($i/30)"
            sleep 2
          done
          echo "App failed to start"
          docker logs myapp
          exit 1

  sbom-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run SBOM scan
        uses: ./.github/actions/sbom-scan
