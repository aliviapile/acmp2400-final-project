name: Build-Curl

on:
  workflow_dispatch:

jobs:
  build-and-curl:
    runs-on: ubuntu-latest

    steps:
      - name: Get code
        uses: actions/checkout@v4

      - name: docker_build
        run: |
          docker build -t pipeline-test ./ACMP2400

      - name: docker_run
        env:
          DJANGO_SECRET_KEY: ${{ secrets.DJANGO_SECRET_KEY }}
        run: |
          docker run -d -p 8000:8000 \
            -e DJANGO_SECRET_KEY="$DJANGO_SECRET_KEY" \
            --name test-container pipeline-test

      - name: wait_for_app
        run: |
          for i in {1..30}; do
            if curl -f http://localhost:8000/ 2>/dev/null; then
              echo "App is ready"
              exit 0
            fi
            echo "Waiting for app to start... ($i/30)"
            sleep 2
          done
          echo "App failed to start"
          exit 1

      - name: Show container logs
        run: docker logs test-container
